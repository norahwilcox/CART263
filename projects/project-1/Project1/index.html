<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Booth</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<!-- Imported background page from : https://www.artsy.net/article/artsy-editorial-story-worlds-famous-desktop-background
 and pixelated the photo using photoshop-->
<body>
    <!-- Start Page -->
    <div class="page" id="startPage" data-page="start">
        <div class="base">
            <!-- Top blue title bar-->
            <div class="tab">
                <p class="names">Leah + Norah</p>
                <div class="xBtn">
                    <p class="x">X</p>
                </div>
            </div>
            <!-- White content area in the window-->
            <div class="white">
                <p class="title">CART 263</p>
            </div>
            <!-- Start Button -->
            <div class="container" data-next="filterPage">
                <p class="start">START</p>
            </div>
            
        </div>
    </div>

    <!-- Filter Page -->
    <div class="page" id="filterPage" data-page="filter">
        <div class="base">
            <!-- Top title bar-->
            <div class="tab">
                <p class="names">Leah + Norah</p>
                <div class="xBtn">
                    <p class="x">X</p>
                </div>
            </div>
            <!-- Main content area -->
            <div class="container">
                <!-- Folder System -->
                <div class="fileSystem">
                    <!-- Parent folder row-->
                    <div class="fileRow" data-folder id="filterFolder">
                        <img src="assets/file.closed.png" class="fileIcon">
                        <p>Filters</p>
                    </div>
                    <!-- Children folder row-->
                    <div class="fileChildren">
                        <div class="fileRow filterOption" data-filter="coolbw">
                            <p>Cool B&W</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="soft">
                            <p>Soft Blur</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="invert">
                            <p>Invert</p>
                        </div>
                           <div class="fileRow filterOption is-selected" data-filter="bw">
                            <p>Invert B&W</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="sepia">
                            <p>Sepia</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="analog">
                            <p>Analog</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="film">
                            <p>Vintage Film</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="cyber">
                            <p>Cyber</p>
                        </div>
                        <div class="fileRow filterOption" data-filter="matrix">
                            <p>Matrix</p>
                        </div>
                    </div>
                </div>
                <!-- White area for video preview-->
                <div class="white">
                    <div class="videoContainer">
                        <video autoplay playsinline></video> <!-- Video element showing the webcam stream -->
                        <div class="filterOverlay"></div>
                    </div>
                </div>
            </div>
            <!-- Navigation button area in the bottom -->
            <div class="buttons">
                <div class="btn" data-back="startPage">
                    <p class="back">‹ Back</p>
                </div>
                <div class="btn" data-next="cameraPage">
                    <p class="next">Next ›</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Camera Page -->
    <div class="page" id="cameraPage" data-page="camera"> <!-- Full page section for camera page -->
        <div class="base"> <!-- Main window -->
            <!-- Top title bar -->
            <div class="tab">
                <p class="names">Leah + Norah</p>
                <div class="xBtn">
                    <p class="x">X</p>
                </div>
            </div>
            <!-- White area for camera preview -->
            <div class="cameraPanel">
                <div class="white">
                    <div class="videoContainer">
                        <video autoplay playsinline></video><!-- Video element showing the webcam stream -->
                        <div class="filterOverlay"></div>
                        <div id="flashOverlay"></div>
                        <div id="countdownDisplay"></div>
                    </div>
                </div>
                <div class="cameraSettings">
                    <p class="timerLabel">Timer</p>
                    <button class="timerBtn" type="button" data-countdown="3">3s</button>
                    <button class="timerBtn" type="button" data-countdown="5">5s</button>
                </div>
            </div>
            <!-- Navigation button in the bottom of the page-->
            <div class="buttons">
                <div class="btn" data-back="filterPage">
                    <p class="back">‹ Back</p>
                </div>
                <div class="capture" id="captureBtn"></div> 
                <div class="btn" data-next="albumPage">
                    <p class="next">Next ›</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Album Page -->
    <div class="page" id="albumPage" data-page="album"> <!-- Full page section for album page -->
        <div class="base"> <!-- Main window-->
           
            <!-- Top title bar -->
            <div class="tab">
                <p class="names">Leah + Norah</p>
                <div class="xBtn">
                    <p class="x">X</p>
                </div>
            </div>

            <!-- White area for captured photos-->
            <div class="white" id="album"></div>

            <!-- Buttons for the bottom part -->
            <div class="buttons">
                <div class="btn" data-back="cameraPage">
                    <p class="back">‹ Back</p>
                </div>
                <div class="btn" id="deleteBtn">
                    <p class="deleteAll">Delete All</p>
                </div>
                <div class="btn" id="downloadBtn">
                    <p class="saveAll">Save All</p>
                </div>
                <div class="btn" data-next="startPage">
                    <p class="next">Start ›</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden canvas to capture video frames as image-->
    <canvas id="photoCanvas" style="display:none;"></canvas>
    <script src="./js/app.js"></script>
</body>

</html>
