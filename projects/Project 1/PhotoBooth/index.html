<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Photo Booth</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Start Page -->
    <div class="page" id="startPage" data-page="start">
        <div class="rectangle-1">

            <div class="rectangle-2">
                <p class="names">Leah + Norah</p>
                <div class="rectangle-3">
                    <p class="x">X</p>
                </div>
            </div>

            <div class="rectangle-4">
                <p class="title">CART 263</p>
            </div>

            <div class="rectangle-5" data-next="filterPage">
                <p class="start">START</p>
            </div>

        </div>
    </div>

    <!-- Filter Page -->
    <div class="page" id="filterPage" data-page="filter">
        <div class="rectangle-1">

            <div class="rectangle-2">
                <p class="names">Leah + Norah</p>
                <div class="rectangle-3">
                    <p class="x">X</p>
                </div>
            </div>

            <div class="rectangle-5">
                <div class="rectangle-4"></div>
            </div>

            <div class="buttons">
                <div class="rectangle-6" data-back="startPage">
                    <p class="back">‹ Back</p>
                </div>
                <div class="rectangle-7" data-next="cameraPage">
                    <p class="next">Next ›</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Camera Page -->
    <div class="page" id="cameraPage" data-page="camera">
        <div class="rectangle-1">

            <div class="rectangle-2">
                <p class="names">Leah + Norah</p>
                <div class="rectangle-3">
                    <p class="x">X</p>
                </div>
            </div>

            <div class="rectangle-4"></div>

            <div class="buttons">
                <div class="rectangle-6" data-back="filterPage">
                    <p class="back">‹ Back</p>
                </div>
                <div class="capture"></div>
                <div class="rectangle-7" data-next="albumPage">
                    <p class="next">Next ›</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Album Page -->
    <div class="page" id="albumPage" data-page="album">
        <div class="rectangle-1">

            <div class="rectangle-2">
                <p class="names">Leah + Norah</p>
                <div class="rectangle-3">
                    <p class="x">X</p>
                </div>
            </div>

            <div class="rectangle-4"></div>

            <div class="buttons">
                <div class="rectangle-6" data-back="cameraPage">
                    <p class="back">‹ Back</p>
                </div>
                <div class="rectangle-7" data-next="startPage">
                    <p class="next">Start ›</p>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
