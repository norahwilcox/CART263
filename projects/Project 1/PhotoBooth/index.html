<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Photo Booth</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <div class="start-page" id="startPage">
        <div class="rectangle-1">

            <div class="rectangle-2">
                <p class="names">Leah + Norah</p>
                <div class="rectangle-3">
                    <p class="x">X</p>
                </div>
            </div>


            <div class="rectangle-4">
                <p class="title">CART 263</p>
            </div>

            <div class="rectangle-5">
                <p class="start">START</p>
            </div>

        </div>
    </div>

    <div class="filter-page" id="filterPage"> 
        
        <div class="rectangle-1 filter-version">
            <div class="rectangle-2">
                <p class="names">Leah + Norah</p>
                <div class="rectangle-3">
                    <p class="x">X</p>
                </div>
            </div>
        
            <div class="rectangle-4">
                <p class="title">CART 263 - Filter Mode</p>
            </div>
        
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>

</html>
